{% extends 'main.html' %}
{% block gtag %}gtag('config', 'UA-176036079-2', {'page_path': '/contact'});{% endblock %}
{% block title %}Contact{% endblock %}
{% block content %}

<div class="page-hero">
    <h1 class="page-hero-title">Contact Us</h1>
    <p class="page-hero-subtitle">Have a question or suggestion? We'd love to hear from you.</p>
</div>

<div class="content-body">
    <div class="contact-card">
        <div class="contact-form">
            <form action="https://formspree.io/f/maylewbq" method="POST">
                <label for="name">Name</label>
                <input type="text" name="name" required>
                <label for="email">Email Address</label>
                <input type="email" name="_replyto" required>
                <label for="message">Message</label>
                <textarea name="message" required></textarea>
                <input type="submit" value="Send Message">
            </form>
        </div>
    </div>
</div>

{% endblock %}
